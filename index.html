<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diego Tecnolog.ia | Cursos de IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #C9A84C;
      --gold-light: #E8C96A;
      --black:      #0A0A0A;
      --black-soft: #111111;
      --white:      #FFFFFF;
      --gray:       #A0A0A0;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--gray);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 3rem;
    }

    .logo span {
      color: var(--gold);
    }

    .badge {
      display: inline-block;
      background: rgba(201,168,76,0.12);
      border: 1px solid rgba(201,168,76,0.3);
      color: var(--gold);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.4rem 1rem;
      border-radius: 100px;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 900;
      line-height: 1.15;
      margin-bottom: 1.5rem;
    }

    h1 span {
      color: var(--gold);
    }

    p {
      font-size: 1.1rem;
      color: var(--gray);
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 3rem;
    }

    .cta-link {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: linear-gradient(135deg, var(--gold), var(--gold-light, #E8C96A));
      color: #0A0A0A;
      font-weight: 700;
      font-size: 1rem;
      padding: 1rem 2rem;
      border-radius: 8px;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .cta-link:hover {
      opacity: 0.85;
    }

    .cta-link svg {
      width: 18px;
      height: 18px;
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      color: var(--gray);
      font-size: 0.75rem;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <div class="logo">Diego<span>Tecnolog.ia</span></div>

  <div class="badge">Em breve</div>

  <h1>Todos os cursos<br /><span>disponíveis aqui</span></h1>

  <p>Novidades chegando. Fique de olho neste espaço — em breve você encontrará tudo o que precisa para crescer com inteligência artificial.</p>

  <a href="/abundanciacomunidade" class="cta-link">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a4 4 0 00-5.356-3.765M9 20H4v-2a4 4 0 015.356-3.765M15 7a4 4 0 11-8 0 4 4 0 018 0zm6 3a3 3 0 11-6 0 3 3 0 016 0z" />
    </svg>
    Conheça a Comunidade abundânc.ia
  </a>

  <footer>© 2026 diegotecnolog.ia — Todos os direitos reservados</footer>

</body>
</html>
